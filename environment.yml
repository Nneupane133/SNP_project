name: SNP-project
channels:
  - bioconda 
  - conda-forge
  - defaults
dependencies:
  - git=2.53.0
  - cxx-compiler=1.11.0
  - cmake=4.2.3
  - python>=3.8
  - r-base
  - r-ggplot2
  - quarto
  - iqtree
  - pyyaml
  - scipy
  - numpy
  - matplotlib
  - seaborn
  - munkres>=1.1.1
  - gcc=9.4.0
  - sra-tools
  - fastqc=0.11.9
  - multiqc=1.11 
  - trimmomatic=0.39
  - bwa=0.7.17
  - samtools=1.15.1
  - bcftools=1.15.1
  - vcftools=0.1.16
  - gffread=0.12.7 
  - pip

# conda env create --file environment.yml
# conda activate gecko-project
# conda deactivate

# when you want to update the environment, run:
# conda env update --file environment.yml --prune

# but it might be easier to create a new environment and then delete the old one:
# conda env create --name gecko-project --file environment.yml --force (force will remove existing gecko-environment environment before creating it anew)

